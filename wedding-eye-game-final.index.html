<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猜新娘的眼睛 💍</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');
:root{--gold:#C9A84C;--gold-light:#E8C96A;--rose:#D4899A;--cream:#FDF6EE;--dark:#2C1810;--blush:#F5E6E8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:var(--cream);font-family:'Noto Sans SC',sans-serif;overflow-x:hidden;}

/* petals */
.petal{position:fixed;width:8px;height:12px;background:radial-gradient(ellipse,rgba(212,137,154,.6),rgba(245,230,232,.3));border-radius:50% 0 50% 0;animation:float linear infinite;pointer-events:none;z-index:0;}
@keyframes float{0%{transform:translateY(-20px) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:.8}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ===== INTRO ===== */
#introScreen{
  position:fixed;inset:0;z-index:300;
  background:linear-gradient(160deg,#1a0a05 0%,#3d1a0a 50%,#1a0a05 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px 20px;overflow-y:auto;
  transition:opacity 0.7s ease;
}
#introScreen.hide{opacity:0;pointer-events:none;}

.intro-rings{font-size:44px;margin-bottom:12px;display:inline-block;animation:sway 3s ease-in-out infinite;}
@keyframes sway{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
.intro-title{font-family:'Noto Serif SC',serif;font-size:clamp(1.5rem,5vw,2rem);color:var(--gold-light);letter-spacing:3px;margin-bottom:4px;text-align:center;}
.intro-sub{color:rgba(255,255,255,.4);font-size:.8rem;letter-spacing:3px;margin-bottom:20px;}

.divider{display:flex;align-items:center;gap:8px;width:100%;max-width:340px;margin-bottom:20px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;}
.divider::before{background:linear-gradient(90deg,transparent,rgba(201,168,76,.5));}
.divider::after{background:linear-gradient(90deg,rgba(201,168,76,.5),transparent);}
.divider span{color:var(--gold);font-size:13px;}

.rules{width:100%;max-width:360px;display:flex;flex-direction:column;gap:11px;margin-bottom:28px;}
.rule{display:flex;align-items:flex-start;gap:11px;background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.18);border-radius:14px;padding:11px 14px;opacity:0;transform:translateY(14px);transition:opacity .4s ease, transform .4s ease;}
.rule.visible{opacity:1;transform:translateY(0);}
.rn{min-width:26px;height:26px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#2C1810;flex-shrink:0;margin-top:1px;}
.rt{color:rgba(255,255,255,.85);font-size:.88rem;line-height:1.6;}
.rt em{color:var(--gold-light);font-style:normal;font-weight:500;}

.start-btn{
  padding:15px 44px;background:linear-gradient(135deg,var(--gold),var(--gold-light));
  border:none;border-radius:50px;color:#2C1810;
  font-family:'Noto Serif SC',serif;font-size:1.05rem;font-weight:700;
  cursor:pointer;letter-spacing:2px;
  box-shadow:0 6px 24px rgba(201,168,76,.4);
  transition:all .3s ease;
  opacity:0;transform:translateY(14px);
  transition:opacity .4s ease .7s, transform .4s ease .7s, box-shadow .3s ease;
}
.start-btn.visible{opacity:1;transform:translateY(0);}
.start-btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(201,168,76,.5);}

/* ===== GAME ===== */
#gameScreen{display:none;}
#gameScreen.show{display:block;}

.container{position:relative;z-index:1;width:100%;max-width:520px;margin:0 auto;padding:20px;text-align:center;}
.header{margin-bottom:28px;}
.header .rings{font-size:28px;margin-bottom:8px;animation:sway 3s ease-in-out infinite;display:inline-block;}
.header h1{font-family:'Noto Serif SC',serif;font-size:clamp(1.6rem,5vw,2.2rem);color:var(--dark);line-height:1.3;margin-bottom:6px;}
.header h1 span{color:var(--gold);}
.header p{color:var(--rose);font-size:.9rem;font-weight:300;letter-spacing:2px;}
.game-card{background:white;border-radius:24px;padding:28px 24px;box-shadow:0 4px 24px rgba(201,168,76,.1),0 1px 0 rgba(201,168,76,.2) inset;border:1px solid rgba(201,168,76,.15);position:relative;overflow:hidden;}
.game-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--rose),var(--gold),var(--rose));}
.eye-stage{position:relative;margin:0 auto 20px;width:280px;height:120px;}
.eye-frame{width:280px;height:120px;border-radius:60px;overflow:hidden;border:3px solid var(--gold);box-shadow:0 0 0 6px rgba(201,168,76,.1),0 8px 32px rgba(0,0,0,.12);}
.eye-frame img{width:100%;height:100%;object-fit:cover;object-position:center;transition:opacity .4s ease,transform .4s ease;}
.ornament{position:absolute;font-size:16px;color:var(--gold);}
.ornament.tl{top:-8px;left:10px}.ornament.tr{top:-8px;right:10px}.ornament.bl{bottom:-8px;left:10px}.ornament.br{bottom:-8px;right:10px}
.question{font-family:'Noto Serif SC',serif;font-size:1.2rem;color:var(--dark);margin-bottom:6px;}
.question-sub{font-size:.85rem;color:#999;margin-bottom:20px;font-weight:300;}
.choices{display:flex;gap:14px;justify-content:center;margin-bottom:8px;}
.choice-btn{flex:1;max-width:200px;padding:14px 20px;border-radius:50px;border:2px solid transparent;font-family:'Noto Sans SC',sans-serif;font-size:1rem;font-weight:500;cursor:pointer;transition:all .3s cubic-bezier(.175,.885,.32,1.275);}
.choice-btn:hover{transform:translateY(-2px)}.choice-btn:active{transform:scale(.97)}
.choice-btn.bride{background:linear-gradient(135deg,#FFF0F3,#FDE8ED);border-color:var(--rose);color:#B06070;}
.choice-btn.bride:hover{box-shadow:0 6px 20px rgba(212,137,154,.3);}
.choice-btn.decoy{background:linear-gradient(135deg,#F5F0FF,#EDE8FF);border-color:#B0A0D0;color:#7060A0;}
.choice-btn.decoy:hover{box-shadow:0 6px 20px rgba(160,140,200,.3);}
.score-bar{display:flex;justify-content:center;gap:24px;margin-top:18px;padding:14px 20px;background:var(--blush);border-radius:16px;}
.score-item{text-align:center;}
.score-num{font-family:'Noto Serif SC',serif;font-size:1.6rem;color:var(--gold);line-height:1;}
.score-label{font-size:.75rem;color:#999;margin-top:2px;}
.round-dots{display:flex;justify-content:center;gap:8px;margin-bottom:18px;}
.dot{width:8px;height:8px;border-radius:50%;background:#DDD;transition:all .3s ease;}
.dot.active{background:var(--gold);transform:scale(1.3)}.dot.done{background:var(--rose);}
.result-overlay{position:fixed;inset:0;background:rgba(44,24,16,.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .4s ease;}
.result-overlay.show{opacity:1;pointer-events:all;}
.result-card{background:white;border-radius:28px;padding:36px 32px;max-width:380px;width:90%;text-align:center;transform:scale(.8) translateY(20px);transition:transform .5s cubic-bezier(.175,.885,.32,1.275);position:relative;overflow:hidden;}
.result-overlay.show .result-card{transform:scale(1) translateY(0);}
.result-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--rose),var(--gold),var(--rose));}
.result-emoji{font-size:56px;margin-bottom:10px;display:block;animation:bounce .6s cubic-bezier(.175,.885,.32,1.275) .3s both;}
@keyframes bounce{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.result-title{font-family:'Noto Serif SC',serif;font-size:1.7rem;margin-bottom:10px;}
.result-title.correct{color:var(--gold)}.result-title.wrong{color:var(--rose);}
.result-message{color:#666;font-size:.95rem;line-height:1.8;margin-bottom:22px;white-space:pre-line;}
.conf-piece{position:fixed;border-radius:2px;animation:confetti-fall 3s ease-in forwards;opacity:0;}
@keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0deg) scale(0);opacity:1}20%{opacity:1}100%{transform:translateY(100vh) rotate(720deg) scale(.5);opacity:0}}
.play-again-btn{padding:14px 36px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border:none;border-radius:50px;color:white;font-family:'Noto Sans SC',sans-serif;font-size:1rem;font-weight:500;cursor:pointer;transition:all .3s ease;box-shadow:0 4px 16px rgba(201,168,76,.35);}
.play-again-btn:hover{transform:translateY(-2px);}
.flash{position:fixed;inset:0;z-index:200;pointer-events:none;opacity:0;transition:opacity .1s ease;}
.flash.correct-flash{background:rgba(201,168,76,.25);}.flash.wrong-flash{background:rgba(212,100,100,.25);}.flash.show{opacity:1;}
.music-btn{position:fixed;top:14px;right:14px;z-index:400;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.12);border:2px solid rgba(201,168,76,.5);color:var(--gold-light);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s ease;}
.music-btn:hover{transform:scale(1.1);}.music-btn.muted{border-color:rgba(255,255,255,.15);color:rgba(255,255,255,.25);}
</style>
</head>
<body>

<button class="music-btn" id="musicBtn" onclick="toggleMusic()">&#x1F3B5;</button>
<div class="flash" id="flashOverlay"></div>

<!-- INTRO -->
<div id="introScreen">
  <div class="intro-rings">&#x1F48D;</div>
  <div class="intro-title">猜新娘的眼睛</div>
  <div class="intro-sub">— 新郎挑战赛 —</div>
  <div class="divider"><span>&#x2726;</span></div>
  <div class="rules" id="rulesList">
    <div class="rule" id="r1"><div class="rn">1</div><div class="rt">等一下，你还要玩一个游戏<em>才能娶到你的老婆</em> &#x1F60A;</div></div>
    <div class="rule" id="r2"><div class="rn">2</div><div class="rt">听说，<em>爱一个人</em>，就能认出她的眼睛。</div></div>
    <div class="rule" id="r3"><div class="rn">3</div><div class="rt">那今天，我们就来<em>考验一下我们的新郎</em> &#x1F440;</div></div>
    <div class="rule" id="r4"><div class="rn">4</div><div class="rt">看图片，判断是不是她的眼睛<br>&#x1F496; <em>是我的新娘</em> &nbsp;|&nbsp; &#x1F914; <em>不是她</em></div></div>
    <div class="rule" id="r5"><div class="rn">5</div><div class="rt">共 <em>5张图片</em>，1张1分 — 答对不到 <em>4分</em>……就要被教育咯！&#x1F602;</div></div>
    <div class="rule" id="r6"><div class="rn">6</div><div class="rt" style="color:var(--gold-light);font-size:.95rem;font-weight:500;">现在准备开始 &#x1F389;</div></div>
  </div>
  <button class="start-btn" id="startBtn" onclick="startGame()">开始挑战 &#x1F48D;</button>
</div>

<!-- GAME -->
<div id="gameScreen">
  <div class="container">
    <div class="header">
      <div class="rings">&#x1F48D;</div>
      <h1>猜<span>新娘</span>的眼睛</h1>
      <p>&#x2014; 专为新郎设计的游戏 &#x2014;</p>
    </div>
    <div class="game-card">
      <div class="round-dots" id="roundDots"></div>
      <div class="eye-stage">
        <div class="eye-frame"><img id="eyeImage" src="" alt="眼睛"></div>
        <div class="ornament tl">&#x2726;</div><div class="ornament tr">&#x2726;</div>
        <div class="ornament bl">&#x2726;</div><div class="ornament br">&#x2726;</div>
      </div>
      <p class="question">这是谁的眼睛？</p>
      <p class="question-sub">真正的新郎一定认得出来哦！</p>
      <div class="choices">
        <button class="choice-btn bride" onclick="answer('bride')">&#x1F496; 是我的新娘</button>
        <button class="choice-btn decoy" onclick="answer('decoy')">&#x1F914; 不是她</button>
      </div>
      <div class="score-bar">
        <div class="score-item"><div class="score-num" id="scoreCorrect">0</div><div class="score-label">答对</div></div>
        <div class="score-item"><div class="score-num" id="scoreWrong">0</div><div class="score-label">答错</div></div>
        <div class="score-item"><div class="score-num" id="scoreRound">1</div><div class="score-label">第几轮</div></div>
      </div>
    </div>
  </div>
</div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <span class="result-emoji" id="resultEmoji">&#x1F389;</span>
    <div class="result-title" id="resultTitle"></div>
    <p class="result-message" id="resultMessage"></p>
    <button class="play-again-btn" id="nextBtn">继续</button>
  </div>
</div>

function flashScreen(ok){var f=document.getElementById('flashOverlay');f.className='flash '+(ok?'correct-flash':'wrong-flash')+' show';setTimeout(function(){f.classList.remove('show');},150);}

// Game
var BRIDES=[B1,B2,B3,B4,B5];
var DECOYS=[D1,D2,D3];
var TOTAL=5,score={correct:0,wrong:0},currentRound=0,rounds=[];

// Animate rules one by one
window.addEventListener('load', function(){
  var rules = document.querySelectorAll('.rule');
  rules.forEach(function(r, i){
    setTimeout(function(){ r.classList.add('visible'); }, 200 + i * 200);
  });
  setTimeout(function(){
    document.getElementById('startBtn').classList.add('visible');
  }, 200 + rules.length * 200);
});

function startGame(){
  startBGMusic();
  var intro = document.getElementById('introScreen');
  intro.classList.add('hide');
  setTimeout(function(){
    intro.style.display = 'none';
    document.getElementById('gameScreen').classList.add('show');
  }, 700);
}

function generateRounds(){
  var sb=BRIDES.map(function(img){return{type:'bride',img:img};});
  for(var i=sb.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=sb[i];sb[i]=sb[j];sb[j]=t;}
  var sd=DECOYS.map(function(img){return{type:'decoy',img:img};});
  for(var i=sd.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=sd[i];sd[i]=sd[j];sd[j]=t;}
  rounds=shuffleNC(sb.slice(0,3).concat(sd.slice(0,2)));
}
function shuffleNC(arr){
  for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}
  for(var tries=0;tries<100;tries++){var bad=false;for(var i=0;i<arr.length-1;i++){if(arr[i].img===arr[i+1].img){bad=true;var sw=false;for(var k=i+2;k<arr.length;k++){if(arr[k].img!==arr[i].img&&(i===0||arr[k].img!==arr[i-1].img)&&arr[k].img!==arr[i+1].img){var t=arr[i+1];arr[i+1]=arr[k];arr[k]=t;sw=true;break;}}if(!sw){for(var x=arr.length-1;x>0;x--){var y=Math.floor(Math.random()*(x+1));var tmp=arr[x];arr[x]=arr[y];arr[y]=tmp;}}break;}}if(!bad)break;}return arr;
}
function buildDots(){var c=document.getElementById('roundDots');c.innerHTML='';for(var i=0;i<TOTAL;i++){var d=document.createElement('div');d.className='dot'+(i===0?' active':'');d.id='dot-'+i;c.appendChild(d);}}
function updateDots(){for(var i=0;i<TOTAL;i++){var d=document.getElementById('dot-'+i);d.className=i<currentRound?'dot done':i===currentRound?'dot active':'dot';}}
function loadRound(){if(currentRound>=TOTAL){showFinal();return;}updateDots();document.getElementById('scoreRound').textContent=currentRound+1;var img=document.getElementById('eyeImage');img.style.opacity='0';img.style.transform='scale(.95)';img.src=rounds[currentRound].img;playTick();setTimeout(function(){img.style.opacity='1';img.style.transform='scale(1)';},50);}
function answer(choice){var isBride=rounds[currentRound].type==='bride';var ok=(choice==='bride'&&isBride)||(choice==='decoy'&&!isBride);if(ok){score.correct++;playCorrect();}else{score.wrong++;playWrong();}flashScreen(ok);document.getElementById('scoreCorrect').textContent=score.correct;document.getElementById('scoreWrong').textContent=score.wrong;setTimeout(function(){showResult(ok,isBride);},300);}
